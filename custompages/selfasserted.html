<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Savy</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;

    background:#000;
    color:#fff;

    background-image:
        radial-gradient(circle at center,#101010 0%,#000 75%);

    font-family:'Press Start 2P', monospace;
}

.wrapper{
    width:100%;
    max-width:700px;
}

.card{
    background:#0d0d0d;

    border:3px solid #ffffff;

    box-shadow:
        0 0 0 3px #000,
        0 0 0 6px #fff;

    padding:20px;
}

.logo{
    text-align:center;
    margin-bottom:10px;
}

/* REPLACE WITH YOUR PIXEL LOGO FILE */

.logo-image{
    width:72px;
    image-rendering:pixelated;
}

.logo-title{
    font-size:22px;
    margin-top:8px;
    letter-spacing:4px;
}

.logo-tagline{
    margin-top:6px;
    font-size:8px;
    opacity:.8;
}

.separator{
    height:2px;
    background:#fff;
    margin:15px 0;
}

#api{
    background:#fff;
    color:#000;

    border:3px solid #000;

    padding:20px;
}


/* =======================================
   FORCE PIXEL FONT FOR EVERYTHING
======================================= */

#api,
#api *{
    font-family:'Press Start 2P', monospace !important;
}
#api{
    display:flex !important;
    flex-direction:column !important;

    background:#fff;
    color:#000;

    border:3px solid #000;

    padding:20px;
}


/* =======================================
   REMOVE UGLY B2C HELPERS
======================================= */

.helpLink,
#api .helpLink,
#forgotPassword + div,
#simplemodal-container{
    display:none !important;
}


/* =======================================
   REMOVE DUPLICATE HEADINGS
======================================= */

#api h1,
#api h2,
#api h3,
#api .intro{
    display:none !important;
}


/* =======================================
   LABELS
======================================= */

#api label{
    display:block !important;

    font-size:11px !important;
    line-height:1.6 !important;

    margin-bottom:8px !important;

    color:#000 !important;
}


/* =======================================
   INPUTS
======================================= */

#api input{
    width:100% !important;

    height:56px !important;
    padding:16px !important;

    border:2px solid #000 !important;
    border-radius:0 !important;

    margin-bottom:14px !important;

    box-shadow:none !important;

    font-size:12px !important;
    line-height:1.4 !important;
}


/* =======================================
   BUTTONS
======================================= */

#api button{
    width:100% !important;

    height:58px !important;

    border:0 !important;

    background:#000 !important;
    color:#fff !important;

    font-size:11px !important;

    text-transform:uppercase !important;

    cursor:pointer !important;

    margin-top:8px !important;
}

#api button:hover{
    background:#222 !important;
}


/* =======================================
   DROPDOWNS
======================================= */

#api select{
    font-size:10px !important;
    font-family:'Press Start 2P', monospace !important;
}


/* =======================================
   LINKS
======================================= */

#api a{
    color:#000 !important;

    font-size:10px !important;
    text-decoration:none !important;
}


/* =======================================
   VERIFICATION CONTROLS
======================================= */

#api .verificationControlContent,
#api .verificationSuccessText,
#api .verificationErrorText{
    font-family:'Press Start 2P', monospace !important;

    font-size:11px !important;
    line-height:1.8 !important;

    white-space:normal !important;
}
/* =======================================
   NEW USER / RETURNING USER
======================================= */

#api .create{
    order:-1 !important;
    display:block !important;
    margin-bottom:25px !important;
}

#api .create::before{
    content:"NEW USER";
    display:block;

    text-align:center;

    font-size:10px;

    margin-bottom:15px;
}

#api #createAccount{
    display:block !important;

    width:100% !important;

    background:#000 !important;
    color:#fff !important;

    border:2px solid #000 !important;

    padding:18px !important;

    text-align:center !important;

    text-decoration:none !important;

    font-size:11px !important;
}

#api #createAccount::before{
    content:"DON'T HAVE AN ACCOUNT? ";
}

#api .entry{
    margin-top:20px !important;
    padding-top:20px !important;

    border-top:2px solid #000 !important;
}

#api .entry::before{
    content:"RETURNING USER";

    display:block;

    margin-bottom:18px;

    font-size:10px;

    color:#000;
}

/* =======================================
   FOOTER
======================================= */

.footer{
    text-align:center;

    margin-top:12px;

    font-size:8px;
    opacity:.7;
}

.footer span{
    display:block;
    margin-top:4px;
}


/* =======================================
   MOBILE
======================================= */

@media(max-width:768px){

    .card{
        padding:15px;
    }

    .logo-image{
        width:56px;
    }

    .logo-title{
        font-size:18px;
    }

    .logo-tagline{
        font-size:7px;
    }

    #api{
        padding:15px;
    }

    #api label{
        font-size:8px !important;
    }

    #api input{
        font-size:8px !important;
    }

    #api button{
        font-size:8px !important;
    }
}

</style>
</head>

<body>

<div class="wrapper">

    <div class="card">

        <div class="logo">

            <!-- REPLACE WITH PIXEL LOGO -->

            <!--
            <img
                src="./images/savy-logo.png"
                class="logo-image"
                alt="Savy">
            -->

            <div class="logo-title">
                SAVY
            </div>

            <div class="logo-tagline">
                SURPASSING LIMIT
            </div>

        </div>

        <div class="separator"></div>

        <div id="api"></div>

        <div class="footer">
            SAVY IDENTITY PLATFORM
            <span>EST. 2026</span>
        </div>

    </div>

</div>

</body>
</html>
